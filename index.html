<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vegas Golf Scorecard</title>
    <style>
        :root {
            --team-a-bg: #e3f2fd;
            --team-a-border: #1e88e5;
            --team-b-bg: #ffebee;
            --team-b-border: #e53935;
            --dark-text: #2c3e50;
            --light-bg: #f8f9fa;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 10px;
            background-color: #121212;
            color: #ffffff;
            padding-bottom: 80px;
        }

        h2, h3 {
            margin: 5px 0;
            text-align: center;
        }

        /* Running Score Banner */
        .banner {
            background: linear-gradient(135deg, #2c3e50, #1a252f);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            border: 2px solid #34495e;
            margin-bottom: 15px;
        }

        /* Team Setup Section */
        .setup-container {
            background-color: #1e1e1e;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #333;
        }

        .teams-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .team-box {
            padding: 10px;
            border-radius: 8px;
            color: var(--dark-text);
        }

        .team-box.a { background-color: var(--team-a-bg); border-left: 5px solid var(--team-a-border); }
        .team-box.b { background-color: var(--team-b-bg); border-left: 5px solid var(--team-b-border); }

        .team-box h4 { margin: 0 0 8px 0; font-size: 1rem; text-transform: uppercase; }

        .team-box input {
            width: 90%;
            padding: 6px;
            margin-bottom: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        /* Mobile View / Hole Selection Carousel */
        .hole-selector {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #1e1e1e;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .hole-btn {
            background-color: #333;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* Player Card Rows */
        .player-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #1e1e1e;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
        }

        .player-row.team-a-row { border-left: 4px solid var(--team-a-border); }
        .player-row.team-b-row { border-left: 4px solid var(--team-b-border); }

        .player-name-label {
            font-weight: bold;
            width: 35%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .score-controls {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .score-btn {
            background-color: #444;
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 5px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .score-display {
            width: 30px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
        }

        /* Modifier Buttons */
        .modifier-btn {
            background-color: #333;
            color: #aaa;
            border: 1px solid #555;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .modifier-btn.active-birdie {
            background-color: #2ecc71;
            color: white;
            border-color: #27ae60;
        }

        .modifier-btn.active-eagle {
            background-color: #9b59b6;
            color: white;
            border-color: #8e44ad;
        }

        /* Calc Breakdown */
        .math-breakdown {
            background-color: #1a1a1a;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.9rem;
            border: 1px dashed #444;
        }

        .math-line {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

    <div class="banner" id="running-banner">
        Vegas Margin: Even
    </div>

    <div class="setup-container">
        <h3>Configure Teams</h3>
        <div class="teams-grid">
            <div class="team-box a">
                <h4>Team A (Blue)</h4>
                <input type="text" id="p1-name" value="Player 1" oninput="updatePlayerLabels()">
                <input type="text" id="p2-name" value="Player 2" oninput="updatePlayerLabels()">
            </div>
            <div class="team-box b">
                <h4>Team B (Red)</h4>
                <input type="text" id="p3-name" value="Player 3" oninput="updatePlayerLabels()">
                <input type="text" id="p4-name" value="Player 4" oninput="updatePlayerLabels()">
            </div>
        </div>
    </div>

    <div class="hole-selector">
        <button class="hole-btn" onclick="changeHole(-1)">&larr;</button>
        <span id="hole-title" style="font-size: 1.2rem; font-weight: bold;">Hole 1 (Par 4)</span>
        <button class="hole-btn" onclick="changeHole(1)">&rarr;</button>
    </div>

    <div id="scorecard-inputs">
        <div class="player-row team-a-row">
            <span class="player-name-label" id="lbl-p1">Player 1</span>
            <div class="score-controls">
                <button class="score-btn" onclick="adjustScore(1, -1)">&minus;</button>
                <span class="score-display" id="scr-p1">4</span>
                <button class="score-btn" onclick="adjustScore(1, 1)">&plus;</button>
                <button class="modifier-btn" id="mod-p1" onclick="toggleModifier(1)">Birdie</button>
            </div>
        </div>
        <div class="player-row team-a-row">
            <span class="player-name-label" id="lbl-p2">Player 2</span>
            <div class="score-controls">
                <button class="score-btn" onclick="adjustScore(2, -1)">&minus;</button>
                <span class="score-display" id="scr-p2">5</span>
                <button class="score-btn" onclick="adjustScore(2, 1)">&plus;</button>
                <button class="modifier-btn" id="mod-p2" onclick="toggleModifier(2)">Birdie</button>
            </div>
        </div>

        <div class="player-row team-b-row">
            <span class="player-name-label" id="lbl-p3">Player 3</span>
            <div class="score-controls">
                <button class="score-btn" onclick="adjustScore(3, -1)">&minus;</button>
                <span class="score-display" id="scr-p3">4</span>
                <button class="score-btn" onclick="adjustScore(3, 1)">&plus;</button>
                <button class="modifier-btn" id="mod-p3" onclick="toggleModifier(3)">Birdie</button>
            </div>
        </div>
        <div class="player-row team-b-row">
            <span class="player-name-label" id="lbl-p4">Player 4</span>
            <div class="score-controls">
                <button class="score-btn" onclick="adjustScore(4, -1)">&minus;</button>
                <span class="score-display" id="scr-p4">4</span>
                <button class="score-btn" onclick="adjustScore(4, 1)">&plus;</button>
                <button class="modifier-btn" id="mod-p4" onclick="toggleModifier(4)">Birdie</button>
            </div>
        </div>
    </div>

    <div class="math-breakdown">
        <h4>Hole Calculation Breakdown</h4>
        <div class="math-line"><span>Team A Formed Number:</span><span id="calc-team-a">45</span></div>
        <div class="math-line"><span>Team B Formed Number:</span><span id="calc-team-b">44</span></div>
        <div class="math-line"><span>Points Scored This Hole:</span><span id="calc-hole-margin">Team B +1</span></div>
    </div>

    <script>
        let currentHole = 1;
        
        // Initialize complete 18-hole state matrix
        const roundData = {};
        for(let h=1; h<=18; h++) {
            roundData[h] = {
                p1: 4, p2: 5, p3: 4, p4: 4,
                m1: 0, m2: 0, m3: 0, m4: 0 // 0=None, 1=Birdie, 2=Eagle
            };
        }

        function updatePlayerLabels() {
            document.getElementById('lbl-p1').innerText = document.getElementById('p1-name').value;
            document.getElementById('lbl-p2').innerText = document.getElementById('p2-name').value;
            document.getElementById('lbl-p3').innerText = document.getElementById('p3-name').value;
            document.getElementById('lbl-p4').innerText = document.getElementById('p4-name').value;
            calculateVegas();
        }

        function changeHole(direction) {
            currentHole += direction;
            if (currentHole < 1) currentHole = 1;
            if (currentHole > 18) currentHole = 18;
            
            document.getElementById('hole-title').innerText = `Hole ${currentHole} (Par 4)`;
            loadHoleData();
        }

        function loadHoleData() {
            const data = roundData[currentHole];
            document.getElementById('scr-p1').innerText = data.p1;
            document.getElementById('scr-p2').innerText = data.p2;
            document.getElementById('scr-p3').innerText = data.p3;
            document.getElementById('scr-p4').innerText = data.p4;
            
            for(let i=1; i<=4; i++) {
                updateModifierButtonVisual(i, data[`m${i}`]);
            }
            calculateVegas();
        }

        function adjustScore(playerNum, val) {
            const data = roundData[currentHole];
            let key = `p${playerNum}`;
            data[key] = Math.max(1, data[key] + val);
            document.getElementById(`scr-p${playerNum}`).innerText = data[key];
            calculateVegas();
        }

        function toggleModifier(playerNum) {
            const data = roundData[currentHole];
            let key = `m${playerNum}`;
            // Toggle loop: Normal (0) -> Birdie (1) -> Eagle (2) -> Normal (0)
            data[key] = (data[key] + 1) % 3;
            updateModifierButtonVisual(playerNum, data[key]);
            calculateVegas();
        }

        function updateModifierButtonVisual(playerNum, state) {
            const btn = document.getElementById(`mod-p${playerNum}`);
            btn.className = "modifier-btn";
            if (state === 1) {
                btn.innerText = "⭐ Birdie";
                btn.classList.add("active-birdie");
            } else if (state === 2) {
                btn.innerText = "🔥 Eagle";
                btn.classList.add("active-eagle");
            } else {
                btn.innerText = "Normal";
            }
        }

        function computeTeamVegasNumber(s1, s2, opposingHasBirdie) {
            // Rule 1: If any player scores double digits (10+), that number MUST go first
            if (s1 >= 10 || s2 >= 10) {
                return (s1 >= 10) ? parseInt(`${s1}${s2}`) : parseInt(`${s2}${s1}`);
            }
            // Rule 2: If opposing team hit a Birdie, reverse the number layout to highest-first
            if (opposingHasBirdie) {
                return s1 > s2 ? parseInt(`${s1}${s2}`) : parseInt(`${s2}${s1}`);
            }
            // Standard Condition: Lowest digit pairs first
            return s1 < s2 ? parseInt(`${s1}${s2}`) : parseInt(`${s2}${s1}`);
        }

        function calculateVegas() {
            let runningTotalA = 0;
            let runningTotalB = 0;

            for (let h = 1; h <= 18; h++) {
                const data = roundData[h];
                
                let teamABirdie = (data.m1 === 1 || data.m2 === 1);
                let teamBBirdie = (data.m3 === 1 || data.m4 === 1);

                let valA = computeTeamVegasNumber(data.p1, data.p2, teamBBirdie);
                let valB = computeTeamVegasNumber(data.p3, data.p4, teamABirdie);

                let diff = Math.abs(valA - valB);

                if (valA < valB) {
                    runningTotalA += diff;
                    if (h === currentHole) {
                        document.getElementById('calc-hole-margin').innerText = `${document.getElementById('p1-name').value || 'Team A'} +${diff}`;
                    }
                } else {
                    runningTotalB += diff;
                    if (h === currentHole) {
                        document.getElementById('calc-hole-margin').innerText = `${document.getElementById('p3-name').value || 'Team B'} +${diff}`;
                    }
                }

                if (h === currentHole) {
                    document.getElementById('calc-team-a').innerText = valA;
                    document.getElementById('calc-team-b').innerText = valB;
                }
            }

            const banner = document.getElementById('running-banner');
            const t1Name = document.getElementById('p1-name').value || 'Team A';
            const t2Name = document.getElementById('p3-name').value || 'Team B';

            if (runningTotalA === runningTotalB) {
                banner.innerText = "Match Status: All Square (0)";
                banner.style.border = "2px solid #34495e";
            } else if (runningTotalA > runningTotalB) {
                banner.innerText = `${t1Name} up by ${runningTotalA - runningTotalB} pts`;
                banner.style.border = "2px solid var(--team-a-border)";
            } else {
                banner.innerText = `${t2Name} up by ${runningTotalB - runningTotalA} pts`;
                banner.style.border = "2px solid var(--team-b-border)";
            }
        }

        // Run initial calculations on window load
        loadHoleData();
    </script>
</body>
</html>
